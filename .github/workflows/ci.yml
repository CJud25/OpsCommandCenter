name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile all modules
        run: python -m py_compile app.py modules/*.py automations/*.py tests/*.py

      - name: Headless pipeline smoke test
        run: python tests/smoke.py

      - name: Ranker and ROI checks
        run: python tests/test_ranker.py

      - name: Micro-automation idempotency + safety checks
        run: python tests/test_automation.py
