name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the workflow only needs to read the checked-out code.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Compile all modules
        run: python -m py_compile app.py modules/*.py automations/*.py tests/*.py

      # The pytest suite covers everything the old per-script steps did: the
      # end-to-end data-generation + pipeline run (tests/test_smoke.py), the
      # ranker/ROI property tests (tests/test_ranker.py), and the micro-automation
      # idempotency/safety tests (tests/test_automation.py).
      - name: Run tests
        run: python -m pytest -q
